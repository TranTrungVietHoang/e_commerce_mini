
services:
  # Dịch vụ Backend
  backend:
    image: trantrungviethoang/e-commerce-backend:v1.0
    build:
      context: ./e-commerce-backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    # env_file:
    #   - ./e-commerce-backend/.env
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - DB_HOST=sqlserver
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION_ACCESS=${JWT_EXPIRATION_ACCESS}
      - JWT_EXPIRATION_REFRESH=${JWT_EXPIRATION_REFRESH}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - SEPAY_API_KEY=${SEPAY_API_KEY}
      - APP_SEPAY_API_KEY=${APP_SEPAY_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
    depends_on:
      - sqlserver
    restart: always

  # Dịch vụ Frontend
  frontend:
    image: trantrungviethoang/e-commerce-frontend:v1.0
    build:
      context: ./e-commerce-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    restart: always
    depends_on:
      - backend

  # Dịch vụ Database (SQL Server 2022)
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD}" # Mật khẩu lấy từ file .env
      MSSQL_PID: "Developer"
    ports:
      - "1434:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: always

# Định nghĩa volume để dữ liệu Database không bị mất khi tắt Docker
volumes:
  sqlserver_data:
