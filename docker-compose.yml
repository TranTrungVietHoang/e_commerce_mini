
services:
  # Dịch vụ Backend
  backend:
    image: trantrungviethoang/e-commerce-backend:v1.0
    build:
      context: ./e-commerce-backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./e-commerce-backend/.env
    environment:
      - DB_HOST=sqlserver
      - DB_PASSWORD=${DB_PASSWORD}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-}
    depends_on:
      - sqlserver
    restart: always

  # Dịch vụ Frontend
  frontend:
    image: trantrungviethoang/e-commerce-frontend:v1.0
    build:
      context: ./e-commerce-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    restart: always
    depends_on:
      - backend

  # Dịch vụ Database (SQL Server 2022)
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD}" # Mật khẩu lấy từ file .env
      MSSQL_PID: "Developer"
    ports:
      - "1434:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: always

# Định nghĩa volume để dữ liệu Database không bị mất khi tắt Docker
volumes:
  sqlserver_data:
