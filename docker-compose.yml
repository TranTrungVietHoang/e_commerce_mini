version: '3.8'

services:
  # Dịch vụ Backend
  backend:
    image: trantrungviethoang/e-commerce-backend:v1.0
    build:
      context: ./e-commerce-backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    restart: always

  # Dịch vụ Frontend
  frontend:
    image: trantrungviethoang/e-commerce-frontend:v1.0
    build:
      context: ./e-commerce-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    restart: always
    depends_on:
      - backend

# Bạn có thể thêm database vào đây nếu muốn chạy cả SQL Server bằng Docker
